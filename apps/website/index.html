<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./img/icon.png" />
    <script>
  (() => {
    try {
      const t = localStorage.getItem("theme");
      document.documentElement.classList.toggle("dark", t !== "light");
    } catch {
      document.documentElement.classList.add("dark");
    }
  })();
</script>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />

    <meta property="og:title" content="Shadmin" />

      content="Powerful open-source shadcn blocks to build beautiful internal tools, admin panels, and dashboards with React."
    />

    <meta

      content="https://shadmin.turtlesocks.dev/img/shadmin-banner.png"
    />
    <meta

      content="Powerful open-source shadcn blocks to build beautiful internal tools, admin panels, and dashboards with React."
