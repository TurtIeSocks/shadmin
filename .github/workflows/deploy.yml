# Deploy the assembled site (website + /docs + /demo + /r) to GitHub Pages.
# `make build` builds each app and stacks them into ./public; that folder is
# uploaded as the Pages artifact. Requires Settings > Pages > Source = "GitHub Actions".
name: Deploy Shadmin

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions for the official GitHub Pages deployment (no branch push).
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Build site (website + docs + demo + registry -> ./public)
        run: make build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
